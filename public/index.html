<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Office</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
    }

    #tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 1000;
      border: 1px solid #444;
      max-width: 200px;
    }

    #tooltip .project-name {
      font-weight: bold;
      color: #7dd3fc;
      margin-bottom: 4px;
    }

    #tooltip .status {
      color: #a5f3fc;
    }

    #tooltip .status.active {
      color: #4ade80;
    }

    #tooltip .status.idle {
      color: #fbbf24;
    }

    #tooltip .status.sleeping {
      color: #a78bfa;
    }

    #tooltip .status.socializing {
      color: #f472b6;
    }

    #tooltip .time {
      color: #94a3b8;
      font-size: 11px;
      margin-top: 4px;
    }

    #tooltip .parent-info {
      color: #a78bfa;
      font-size: 11px;
      margin-top: 4px;
    }

    #tooltip .child-info {
      color: #7dd3fc;
      font-size: 11px;
      margin-top: 2px;
    }

    #session-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.9);
      border-top: 1px solid #444;
      z-index: 1000;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      max-height: 30vh;
    }

    #session-panel .panel-header {
      color: #7dd3fc;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }

    #session-panel .panel-cards {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    #session-panel .panel-empty {
      color: #666;
      font-size: 12px;
      font-style: italic;
    }

    #session-panel .avatar-card {
      flex-shrink: 0;
      width: 220px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #333;
      border-radius: 6px;
      padding: 10px 12px;
      transition: border-color 0.2s ease;
    }

    #session-panel .avatar-card.highlighted {
      border-color: #7dd3fc;
      box-shadow: 0 0 8px rgba(125, 211, 252, 0.3);
    }

    #session-panel .card-project {
      font-weight: bold;
      color: #fff;
      font-size: 13px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #session-panel .card-status {
      font-size: 11px;
      margin-bottom: 6px;
    }

    #session-panel .card-status.active,
    #session-panel .card-status.working {
      color: #4ade80;
    }

    #session-panel .card-status.idle,
    #session-panel .card-status.sleeping {
      color: #fbbf24;
    }

    #session-panel .card-status.socializing {
      color: #f472b6;
    }

    #session-panel .card-status.exiting {
      color: #94a3b8;
    }

    #session-panel .card-task {
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    #session-panel .card-time {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }

    #status-bar {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #94a3b8;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 11px;
      z-index: 100;
    }

    #status-bar .connected {
      color: #4ade80;
    }

    #status-bar .disconnected {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="tooltip"></div>
  <div id="session-panel">
    <div class="panel-header">Active Sessions</div>
    <div class="panel-cards">
      <div class="panel-empty">No active sessions</div>
    </div>
  </div>
  <div id="status-bar">
    <span id="connection-status" class="disconnected">Disconnected</span>
    <span id="session-count"></span>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
