<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Office</title>
  <!-- Highlight.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
    }

    #canvas-container canvas {
      pointer-events: none;
    }

    canvas {
      display: block;
    }

    #tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 1000;
      border: 1px solid #444;
      max-width: 200px;
    }

    #tooltip .project-name {
      font-weight: bold;
      color: #7dd3fc;
      margin-bottom: 4px;
    }

    #tooltip .status {
      color: #a5f3fc;
    }

    #tooltip .status.active {
      color: #4ade80;
    }

    #tooltip .status.idle {
      color: #fbbf24;
    }

    #tooltip .status.sleeping {
      color: #a78bfa;
    }

    #tooltip .status.socializing {
      color: #f472b6;
    }

    #tooltip .time {
      color: #94a3b8;
      font-size: 11px;
      margin-top: 4px;
    }

    #tooltip .parent-info {
      color: #a78bfa;
      font-size: 11px;
      margin-top: 4px;
    }

    #tooltip .child-info {
      color: #7dd3fc;
      font-size: 11px;
      margin-top: 2px;
    }

    #session-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.9);
      border-top: 1px solid #444;
      z-index: 1000;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      max-height: 30vh;
    }

    #session-panel .panel-header {
      color: #7dd3fc;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }

    #session-panel .panel-cards {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    #session-panel .panel-empty {
      color: #666;
      font-size: 12px;
      font-style: italic;
    }

    #session-panel .avatar-card {
      flex-shrink: 0;
      width: 220px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #333;
      border-radius: 6px;
      padding: 10px 12px;
      transition: border-color 0.2s ease;
    }

    #session-panel .avatar-card.highlighted {
      border-color: #7dd3fc;
      box-shadow: 0 0 8px rgba(125, 211, 252, 0.3);
    }

    #session-panel .card-project {
      font-weight: bold;
      color: #fff;
      font-size: 13px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #session-panel .card-status {
      font-size: 11px;
      margin-bottom: 6px;
    }

    #session-panel .card-status.active,
    #session-panel .card-status.working {
      color: #4ade80;
    }

    #session-panel .card-status.idle,
    #session-panel .card-status.sleeping {
      color: #fbbf24;
    }

    #session-panel .card-status.socializing {
      color: #f472b6;
    }

    #session-panel .card-status.exiting {
      color: #94a3b8;
    }

    #session-panel .card-task {
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    #session-panel .card-time {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }

    #status-bar {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #94a3b8;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 11px;
      z-index: 100;
    }

    #status-bar .connected {
      color: #4ade80;
    }

    #status-bar .disconnected {
      color: #f87171;
    }

    /* Session Modal Styles */
    .session-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .session-modal.hidden {
      display: none;
    }

    .modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
    }

    .modal-content {
      position: relative;
      width: 90%;
      max-width: 900px;
      max-height: 85vh;
      background: #1e1e2e;
      border-radius: 12px;
      border: 1px solid #444;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: #252538;
      border-bottom: 1px solid #333;
    }

    .modal-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .modal-project {
      font-size: 18px;
      font-weight: bold;
      color: #7dd3fc;
    }

    .modal-status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
    }

    .modal-status.idle {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
    }

    .modal-close {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 28px;
      cursor: pointer;
      padding: 0 8px;
      line-height: 1;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: #fff;
    }

    .modal-metadata {
      padding: 12px 20px;
      background: #1a1a28;
      border-bottom: 1px solid #333;
      font-size: 12px;
      color: #94a3b8;
    }

    .meta-row {
      display: flex;
      gap: 24px;
      margin-bottom: 4px;
    }

    .meta-row:last-child {
      margin-bottom: 0;
    }

    .meta-item strong {
      color: #64748b;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .modal-loading,
    .modal-error {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }

    .modal-error {
      color: #f87171;
    }

    .modal-conversation {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Message Styles */
    .message {
      border-radius: 8px;
      overflow: hidden;
    }

    .message-user {
      background: #1a365d;
      border: 1px solid #2563eb;
    }

    .message-assistant {
      background: #1e293b;
      border: 1px solid #475569;
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.2);
      font-size: 12px;
    }

    .message-role {
      font-weight: bold;
      color: #e2e8f0;
    }

    .message-time {
      color: #64748b;
    }

    .message-content {
      padding: 12px 14px;
    }

    /* Content Block Styles */
    .content-block {
      margin-bottom: 12px;
    }

    .content-block:last-child {
      margin-bottom: 0;
    }

    .content-text {
      color: #e2e8f0;
      line-height: 1.6;
      font-size: 14px;
    }

    .content-text code {
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    .content-text pre {
      background: #0d1117;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .content-text pre code {
      background: none;
      padding: 0;
    }

    /* Thinking Block */
    .content-thinking {
      background: rgba(167, 139, 250, 0.1);
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: 6px;
      overflow: hidden;
    }

    .thinking-header {
      background: rgba(167, 139, 250, 0.2);
      padding: 8px 12px;
      font-size: 11px;
      font-weight: bold;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .thinking-content {
      padding: 12px;
      color: #c4b5fd;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }

    /* Tool Use Styles */
    .tool-use {
      background: #1c1c2e;
      border: 1px solid #333;
      border-radius: 6px;
      overflow: hidden;
    }

    .tool-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #252538;
      font-size: 13px;
    }

    .tool-icon {
      font-size: 14px;
    }

    .tool-name {
      font-weight: bold;
      color: #7dd3fc;
    }

    .tool-input {
      padding: 8px;
      background: #0d1117;
      border-top: 1px solid #333;
      max-height: 200px;
      overflow: auto;
    }

    .tool-input pre {
      margin: 0;
    }

    .tool-input code {
      font-size: 12px;
    }

    /* Tool Result Styles */
    .tool-result {
      border-top: 1px solid #333;
    }

    .tool-result-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: rgba(74, 222, 128, 0.1);
      font-size: 12px;
    }

    .tool-error .tool-result-header {
      background: rgba(248, 113, 113, 0.1);
    }

    .result-label {
      color: #4ade80;
      font-weight: bold;
    }

    .tool-error .result-label {
      color: #f87171;
    }

    .tool-result-content {
      padding: 8px;
      background: #0a0a14;
      max-height: 300px;
      overflow: auto;
    }

    .tool-result-content pre {
      margin: 0;
    }

    .tool-result-content code {
      font-size: 11px;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Scrollbar styling */
    .modal-body::-webkit-scrollbar,
    .tool-input::-webkit-scrollbar,
    .tool-result-content::-webkit-scrollbar,
    .thinking-content::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .modal-body::-webkit-scrollbar-track,
    .tool-input::-webkit-scrollbar-track,
    .tool-result-content::-webkit-scrollbar-track,
    .thinking-content::-webkit-scrollbar-track {
      background: #1a1a28;
    }

    .modal-body::-webkit-scrollbar-thumb,
    .tool-input::-webkit-scrollbar-thumb,
    .tool-result-content::-webkit-scrollbar-thumb,
    .thinking-content::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 4px;
    }

    .modal-body::-webkit-scrollbar-thumb:hover,
    .tool-input::-webkit-scrollbar-thumb:hover,
    .tool-result-content::-webkit-scrollbar-thumb:hover,
    .thinking-content::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* Make cards clickable */
    #session-panel .avatar-card {
      cursor: pointer;
    }

    #session-panel .avatar-card:hover {
      border-color: #7dd3fc;
    }

  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="tooltip"></div>
  <div id="session-panel">
    <div class="panel-header">Active Sessions</div>
    <div class="panel-cards">
      <div class="panel-empty">No active sessions</div>
    </div>
  </div>
  <div id="status-bar">
    <span id="connection-status" class="disconnected">Disconnected</span>
    <span id="session-count"></span>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
